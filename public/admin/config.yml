backend:
  name: github
  repo: digitalmikhin-code/denis-journal
  branch: main
  base_url: https://functions.yandexcloud.net
  auth_endpoint: d4euglff056il9brlmrf

site_url: https://media.dmikhin.ru
display_url: https://media.dmikhin.ru
logo_url: /images/logo.svg

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "ru"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    summary: "{{title}} вЂ” {{date}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["career", "management", "thinking", "agile", "architecture", "cases", "ai"]
