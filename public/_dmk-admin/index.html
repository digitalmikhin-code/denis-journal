<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CMS Admin</title>
  </head>
  <body>
    <div style="padding: 10px 14px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f6f8ff; border-bottom: 1px solid #dbe3ff;">
      <a href="/studio/subscribers" style="display: inline-block; color: #1e3a8a; font-weight: 600; text-decoration: none;">
        Открыть CRM подписчиков
      </a>
    </div>
    <script>
      (function () {
        function applyGithubToken(token) {
          if (!token) return;
          var user = JSON.stringify({ backendName: "github", token: token });
          localStorage.setItem("netlify-cms-user", user);
          localStorage.setItem("decap-cms-user", user);
          if (!location.hash || location.hash === "#/") {
            location.hash = "#/collections/articles";
          }
          location.reload();
        }

        window.addEventListener("message", function (event) {
          if (event.origin !== "https://functions.yandexcloud.net") return;
          if (typeof event.data !== "string") return;
          if (!event.data.startsWith("authorization:github:success:")) return;
          try {
            var payload = JSON.parse(event.data.split("authorization:github:success:")[1]);
            applyGithubToken(payload.token);
          } catch (e) {
            console.error("OAuth message parse error:", e);
          }
        });
      })();
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
