backend:
  name: github
  repo: digitalmikhin-code/denis-journal
  branch: main
  base_url: https://functions.yandexcloud.net
  auth_endpoint: d4euglff056il9brlmrf

site_url: https://media.dmikhin.ru
display_url: https://media.dmikhin.ru
logo_url: /images/logo.svg

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

locale: "ru"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - { label: "Карьера", value: "career" }
          - { label: "Управление и проекты", value: "management" }
          - { label: "Системное мышление", value: "thinking" }
          - { label: "Гибкие трансформации", value: "agile" }
          - { label: "Архитектура решений", value: "architecture" }
          - { label: "Реальные кейсы", value: "cases" }
          - { label: "ИИ в управлении", value: "ai" }
      - { label: "Tags", name: "tags", widget: "list", allow_add: true }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "До 200 символов" }
      - { label: "Cover", name: "cover", widget: "image", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: true }
      - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
      - { label: "Author", name: "author", widget: "string", default: "Денис Михин", required: false }
      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Шаблон: Вступление → 3 тезиса → Вывод и CTA"
        default: |
          ## Вступление
          Краткий контекст и зачем это важно.

          ## Тезис 1
          Основная мысль и пример.

          ## Тезис 2
          Практический инструмент.

          ## Тезис 3
          Ошибки и как их избежать.

          ## Вывод
          Короткий итог + следующий шаг для читателя.

  - name: "videos"
    label: "Videos"
    folder: "content/videos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    editor:
      preview: false
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          date_format: "YYYY-MM-DD",
          time_format: false,
          format: "YYYY-MM-DD"
        }
      - label: "Platform"
        name: "platform"
        widget: "select"
        options: ["youtube", "rutube", "vk"]
      - {
          label: "Video URL",
          name: "url",
          widget: "string",
          hint: "Полная ссылка на видео YouTube / RuTube / VK Video"
        }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }

  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: false
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
