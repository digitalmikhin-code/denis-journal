name: Deploy to Yandex Object Storage

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: deploy-yandex-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      NODE_VERSION: "20"
      YC_ENDPOINT_URL: https://storage.yandexcloud.net
      YC_BUCKET_NAME: media.dmikhin.ru
      NEXT_PUBLIC_SITE_URL: https://media.dmikhin.ru
      YC_ACCESS_KEY_ID_RAW: ${{ secrets.YC_ACCESS_KEY_ID }}
      YC_SECRET_ACCESS_KEY_RAW: ${{ secrets.YC_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ru-central1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build:prod

      - name: Prepare AWS credentials
        shell: bash
        run: |
          ACCESS_KEY_ID="$(printf '%s' "${YC_ACCESS_KEY_ID_RAW}" | tr -d '\r\n[:space:]')"
          SECRET_ACCESS_KEY="$(printf '%s' "${YC_SECRET_ACCESS_KEY_RAW}" | tr -d '\r\n[:space:]')"

          ACCESS_KEY_ID="${ACCESS_KEY_ID%\"}"
          ACCESS_KEY_ID="${ACCESS_KEY_ID#\"}"
          ACCESS_KEY_ID="${ACCESS_KEY_ID%\'}"
          ACCESS_KEY_ID="${ACCESS_KEY_ID#\'}"

          SECRET_ACCESS_KEY="${SECRET_ACCESS_KEY%\"}"
          SECRET_ACCESS_KEY="${SECRET_ACCESS_KEY#\"}"
          SECRET_ACCESS_KEY="${SECRET_ACCESS_KEY%\'}"
          SECRET_ACCESS_KEY="${SECRET_ACCESS_KEY#\'}"

          if [ -z "${ACCESS_KEY_ID}" ] || [ -z "${SECRET_ACCESS_KEY}" ]; then
            echo "Yandex Object Storage secrets are empty after trimming."
            exit 1
          fi

          mkdir -p ~/.aws
          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id = ${ACCESS_KEY_ID}
          aws_secret_access_key = ${SECRET_ACCESS_KEY}
          EOF

          cat > ~/.aws/config <<EOF
          [default]
          region = ${AWS_DEFAULT_REGION}
          EOF

      - name: Upload to Yandex Object Storage
        run: |
          aws s3 sync ./out s3://${YC_BUCKET_NAME} \
            --endpoint-url ${YC_ENDPOINT_URL} \
            --delete

      - name: Set Content-Type for Decap config
        run: |
          aws s3 cp ./out/admin/config.yml s3://${YC_BUCKET_NAME}/admin/config.yml \
            --endpoint-url ${YC_ENDPOINT_URL} \
            --content-type text/yaml

      - name: Verify root objects
        run: |
          aws s3 ls s3://${YC_BUCKET_NAME} --endpoint-url ${YC_ENDPOINT_URL}
